<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flavideal | Queue Display</title>
    
    <style>
        :root {
            --bg-color: #111;
            --accent-color: #ffcc00;
            --panel-bg: #1a1a1a;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Arial', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* FLEXBOX: Automatic switch base sa orientation */
        .main-container {
            display: flex;
            flex-direction: row; /* Default: Landscape (Tabi-tabi) */
            flex-grow: 1;
        }

        /* Number Area */
        .queue-panel {
            flex: 1.2; /* Mas malapad nang konti sa landscape */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #222 0%, #111 100%);
            border-right: 3px solid var(--accent-color);
            text-align: center;
        }

        .label {
            font-size: 4vw;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .number {
            font-size: 25vw;
            font-weight: bold;
            margin: 0;
        }

        /* Video Area */
        .video-panel {
            flex: 1;
            background-color: #000;
            display: flex;
            flex-direction: column;
        }

        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9; /* Maintain TV shape */
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .info-panel {
            padding: 20px;
            flex-grow: 1;
            background: var(--panel-bg);
            border-top: 2px solid #333;
        }

        .info-panel h2 { color: var(--accent-color); font-size: 2vw; margin: 0; }
        .info-panel p { font-size: 1.2vw; color: #aaa; margin-top: 10px; }

        /* PORTRAIT MODE (Tablet/Phone) */
        @media (orientation: portrait) {
            .main-container {
                flex-direction: column; /* Pagpapatungin */
            }
            .queue-panel {
                border-right: none;
                border-bottom: 3px solid var(--accent-color);
                flex: 1;
            }
            .video-panel {
                flex: 1;
            }
            .label { font-size: 8vw; }
            .number { font-size: 40vw; }
            .info-panel h2 { font-size: 5vw; }
            .info-panel p { font-size: 3.5vw; }
        }

        /* Footer */
        .footer {
            height: 60px;
            background: #000;
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
        }

        .brand { font-weight: bold; font-style: italic; color: #444; font-size: 1.5vw; }
        #status-msg { font-size: 1vw; color: #00ff00; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="queue-panel">
            <div class="label">Now Serving</div>
            <div class="number" id="serving">--</div>
        </div>

        <div class="video-panel">
            <div class="video-container">
                <iframe 
                    id="ytplayer"
                    src="https://www.youtube.com/embed/_gyultVTesk?autoplay=1&mute=1&loop=1&playlist=_gyultVTesk&controls=0&rel=0" 
                    frameborder="0" 
                    allow="autoplay; encrypted-media" 
                    allowfullscreen>
                </iframe>
            </div>
            <div class="info-panel">
                <h2>FLAVIDEAL UPDATES</h2>
                <p>• Pay your bills conveniently.<br>
                   • Smartphones & Home Appliances available.<br>
                   • Visit flavideal.com for more info.</p>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="brand">FLAVIDEAL BILLS PAYMENT</div>
        <div id="status-msg">SYSTEM LIVE</div>
    </div>
    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxdL92jEXVhc6hxIIYT-ujfvmQxEVqZaeoMvcJtPE5K4gFuqgymAQVTAYOqNeWiY38/exec';
        let lastNumber = "--";
        let audioEnabled = false;

        function speak(text) {
    if (!audioEnabled) return;

    // I-cancel ang boses kung may kasalukuyang nagsasalita para hindi mag-overlap
    window.speechSynthesis.cancel();

    let message = "";
    
    // Check kung ang text ay purong numero lang (iwas sa "thousand/million" bug)
    // Kung number lang at less than 4 digits, babasahin niya as normal number
    if (!isNaN(text) && text.length < 4) {
        message = "Number " + text;
    } else {
        // Kung may letters (hal. A1), i-ispelling niya bawat character
        let spelledOut = text.split('').join(', ');
        message = spelledOut;
    }

    // Buong sentence na sasabihin ng system
    const finalSentence = "Now serving, " + message + ". Please proceed to the counter.";
    
    const utterance = new SpeechSynthesisUtterance(finalSentence);
    
    // Settings para sa boses
    utterance.lang = 'en-US';
    utterance.rate = 0.8;  // Bilis ng pagsasalita (0.8 ay sakto lang, hindi masyadong mabilis)
    utterance.pitch = 1;   // Tonality ng boses

    window.speechSynthesis.speak(utterance);
}

        function playChime() {
            if (!audioEnabled) return;
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(440, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            osc.start(); osc.stop(audioCtx.currentTime + 1);
        }

        // Palitan ang iyong updateDisplay function sa tv.html
function updateDisplay() {
    fetch(scriptURL + "?getServing=true&t=" + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            let currentNum = data.number ? data.number.toString() : "--";

            // 1. Kung may bagong number
            // 2. O kung inutos ng admin na tumawag ulit (RECALL)
            if (currentNum !== lastNumber || data.action === "RECALL") {
                
                // I-update ang text sa screen
                document.getElementById('serving').innerText = currentNum;
                
                if (currentNum !== "--") {
                    playChime();
                    setTimeout(() => speak(currentNum), 1000);
                }
                
                // I-save ang last number para hindi paulit-ulit tumawag 
                // maliban na lang kung nag-iba ang number o nag-RECALL
                lastNumber = currentNum;
            }
        })
        .catch(err => console.log("Updating..."));
}

        window.onclick = function() {
            audioEnabled = true;
            document.getElementById('status-msg').innerText = "AUDIO ENABLED";
            playChime();
        };

        setInterval(updateDisplay, 5000);
        updateDisplay();
    </script>
</body>
</html>
