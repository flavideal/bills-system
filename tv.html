<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flavideal | Queue Display</title>
    <style>
        :root {
            --bg-color: #111;
            --accent-color: #ffcc00;
            --panel-bg: #1a1a1a;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Arial', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .main-container {
            display: grid;
            grid-template-columns: 55% 45%; /* Mas malapad ang video area */
            flex-grow: 1;
        }

        /* Left: Number */
        .queue-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #222 0%, #111 100%);
            border-right: 3px solid var(--accent-color);
        }

        .label {
            font-size: 4vw;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .number {
            font-size: 30vw;
            font-weight: bold;
            margin: -20px 0;
        }

        /* Right: YouTube Video */
        .video-panel {
            background-color: #000;
            display: flex;
            flex-direction: column;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .info-panel {
            padding: 20px;
            flex-grow: 1;
            background: var(--panel-bg);
        }

        .info-panel h2 { color: var(--accent-color); font-size: 2vw; margin: 0; }
        .info-panel p { font-size: 1.2vw; color: #aaa; }

        /* Footer Ticker */
        .footer {
            height: 60px;
            background: #000;
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            border-top: 1px solid #333;
        }

        .brand { font-weight: bold; font-style: italic; color: #444; font-size: 1.5vw; }
        #status-msg { font-size: 1vw; color: #00ff00; }

        @media (max-width: 1024px) {
            .main-container { grid-template-columns: 100%; }
            .video-panel { display: none; }
            .number { font-size: 50vw; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="queue-panel">
            <div class="label">Now Serving</div>
            <div class="number" id="serving">--</div>
        </div>

        <div class="video-container">
    <iframe 
        id="ytplayer"
        src="https://www.youtube.com/embed/_gyultVTesk?autoplay=1&mute=1&loop=1&playlist=_gyultVTesk&controls=0&rel=0" 
        frameborder="0" 
        allow="autoplay; encrypted-media" 
        allowfullscreen>
    </iframe>
</div>
            <div class="info-panel">
                <h2>FLAVIDEAL UPDATES</h2>
                <p>• Pay your bills conveniently.<br>• Smartphones & Home Appliances available.<br>• Visit flavideal.com for more info.</p>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="brand">FLAVIDEAL BILLS PAYMENT</div>
        <div id="status-msg">SYSTEM LIVE</div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxdL92jEXVhc6hxIIYT-ujfvmQxEVqZaeoMvcJtPE5K4gFuqgymAQVTAYOqNeWiY38/exec';
        let lastNumber = "--";
        let audioEnabled = false;

        function speak(text) {
            if (!audioEnabled) return;
            const spelledOut = text.split('').join(', ');
            const utterance = new SpeechSynthesisUtterance("Now serving... " + spelledOut);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        function playChime() {
            if (!audioEnabled) return;
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(440, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            osc.start(); osc.stop(audioCtx.currentTime + 1);
        }

        function updateDisplay() {
            fetch(scriptURL + "?t=" + new Date().getTime())
                .then(res => res.json())
                .then(data => {
                    let currentNum = data.nowServing.toString();
                    if (currentNum !== lastNumber && currentNum !== "") {
                        document.getElementById('serving').innerText = currentNum;
                        if (lastNumber !== "--") {
                            playChime();
                            setTimeout(() => speak(currentNum), 1000);
                        }
                        lastNumber = currentNum;
                    }
                })
                .catch(err => console.log("Updating..."));
        }

        window.onclick = function() {
            audioEnabled = true;
            document.getElementById('status-msg').innerText = "AUDIO ENABLED";
            playChime();
        };

        setInterval(updateDisplay, 5000);
        updateDisplay();
    </script>
</body>
</html>
