<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCASH Service | FLAVIDEAL</title>
    <style>
        :root { --dark-green: #1b431c; --orange-yellow: #ffc267; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 15px; display: flex; justify-content: center; }
        .kiosk-container { width: 100%; max-width: 500px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 8px solid var(--dark-green); position: relative; }
        .field-group { margin-bottom: 15px; }
        label { font-size: 12px; font-weight: bold; color: #555; display: block; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .mode-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .mode-btn { padding: 15px; border: 2px solid #eee; border-radius: 10px; text-align: center; cursor: pointer; font-weight: bold; }
        .mode-btn.active { background: var(--dark-green); color: white; border-color: var(--dark-green); }
        .qr-box { background: #fff9e6; padding: 15px; border-radius: 10px; text-align: center; margin: 15px 0; border: 2px solid var(--dark-green); }
        .back-btn { background: none; border: none; color: var(--dark-green); font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .cash-logic-box { background: #fdfdfd; padding: 15px; border-radius: 12px; border: 1px solid #eee; margin-top: 10px; }
        .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 14px; margin-bottom: 10px; font-weight: bold; color: var(--dark-green); }
        .sukli-display { font-size: 18px; font-weight: 900; color: #d32f2f; margin-top: 5px; }
        
        /* Review & Success Screens */
        .overlay-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; border-radius: 20px; padding: 25px; box-sizing: border-box; z-index: 10; overflow-y: auto; }
        .review-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        .review-item strong { color: var(--dark-green); }
        .que-number { font-size: 48px; font-weight: 900; color: var(--dark-green); margin: 20px 0; }
        .btn-main { width: 100%; padding: 18px; background: var(--dark-green); color: var(--orange-yellow); border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

<div class="kiosk-container">
    <button class="back-btn" onclick="window.location.href='index.html'">← BACK TO MENU</button>
    
    <div class="card" id="formCard">
        <div id="stepForm">
            <h2 style="color: var(--dark-green); margin-top: 0; text-align: center;">GCASH SERVICE</h2>
            <div class="mode-selector">
                <div id="btnIn" class="mode-btn active" onclick="setMode('Cash In')">CASH IN</div>
                <div id="btnOut" class="mode-btn" onclick="setMode('Cash Out')">CASH OUT</div>
            </div>

            <div class="field-group">
                <label id="nameLabel">Sender Name (Personally Transacting)</label>
                <input type="text" id="custName" placeholder="Pangalan ng nag-abot ng pera">
            </div>

            <div class="field-group">
                <label id="accLabel">GCash Account Name</label>
                <input type="text" id="accName" placeholder="Juan Dela Cruz o J***N D. C**Z">
            </div>

            <div class="field-group">
                <label>GCash Number</label>
                <input type="number" id="accNo" placeholder="09123456789" oninput="if(this.value.length > 11) this.value = this.value.slice(0, 11);">
            </div>

            <div class="field-group">
    <label>Amount</label>
    <input type="number" id="amount" placeholder="0.00" oninput="calculateFee()">
    <div id="liveBreakdown" style="font-size: 13px; margin-top: 8px; color: #555; display: none; background: #f9f9f9; padding: 10px; border-radius: 8px;">
    </div>
</div>

            <div class="field-group">
                <label id="feeOptLabel">Fee Option</label>
                <select id="feeOption" onchange="calculateFee()">
                    <option value="add">ADD-ON (Bayad ang Fee sa labas)</option>
                    <option value="deduct">DEDUCT (Bawas sa papasok na amount)</option>
                </select>
            </div>

            <div id="cashLogicArea" class="cash-logic-box" style="display: none;">
                <label class="checkbox-row">
                    <input type="checkbox" id="isExact" onchange="toggleExact()" style="width: 18px; height: 18px;"> 
                    Sakto ang ibabayad ko (Exact Amount)
                </label>
                <div id="cashInputGroup">
                    <label>Magkano ang cash na iaabot mo?</label>
                    <input type="number" id="cashReceived" placeholder="Amount ng cash" oninput="calculateFee()">
                    <div id="sukliDisplay" class="sukli-display"></div>
                </div>
            </div>

            <button onclick="showReview()" class="btn-main">REVIEW DETAILS</button>
        </div>

        <div id="stepReview" class="overlay-screen">
            <h3 style="color: var(--dark-green); text-align: center;">REVIEW YOUR DETAILS</h3>
            <div id="reviewContent"></div>

            <div id="qrReviewArea" style="display:none;">
                <div class="qr-box">
                    <p style="font-weight: bold; color: var(--dark-green); margin: 0;">STEP 1: SCAN TO PAY VIA QRPH</p>
                    <img src="YOUR_GCASH_QR_URL" style="width: 180px; margin-top: 10px; border-radius: 10px;">
                    <p id="qrInstructionReview" style="font-size: 11px; margin-top: 5px; color: #d32f2f; font-weight: bold;"></p>
                </div>
                <div class="field-group">
                    <label>Step 2: Upload Proof of Receipt</label>
                    <input type="file" id="proofUpload" accept="image/*" style="padding: 5px; font-size: 12px;">
                </div>
            </div>

            <div class="checkbox-row" style="margin-top: 20px;">
                <input type="checkbox" id="termsAgree" style="width: 18px; height: 18px;">
                <label for="termsAgree" style="text-transform: none; font-size: 13px; cursor: pointer;">
                    I agree to the Terms and Conditions and verify that all details are correct.
                </label>
            </div>

            <button onclick="generateNumber()" class="btn-main">GET A NUMBER</button>
            <button onclick="hideReview()" style="background: none; border: none; color: #888; width: 100%; margin-top: 10px; cursor: pointer;">Edit Details</button>
        </div>

        <div id="stepSuccess" class="overlay-screen" style="text-align: center;">
            <div style="font-size: 50px;">✅</div>
            <h2 style="color: var(--dark-green);">SUCCESS!</h2>
            <p style="font-size: 14px; color: #666;">Your transaction has been submitted.</p>
            <p style="margin-bottom: 0;">YOUR QUEUE NUMBER:</p>
            <div id="numberDisplay" class="que-number">G-001</div>
            <p style="font-weight: bold; color: #d32f2f;">Please wait for your number to be called.</p>
            <button onclick="window.location.reload()" class="btn-main">DONE</button>
        </div>
    </div>
</div>

<script>
    let currentMode = "Cash In";

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('btnIn').classList.toggle('active', mode === 'Cash In');
        document.getElementById('btnOut').classList.toggle('active', mode === 'Cash Out');
        document.getElementById('nameLabel').innerText = (mode === 'Cash Out') ? "Customer Name (Nag-transact personally)" : "Sender Name (Personally Transacting)";
        document.getElementById('cashLogicArea').style.display = (mode === 'Cash In') ? 'block' : 'none';
        calculateFee();
    }

    function toggleExact() {
        const isExact = document.getElementById('isExact').checked;
        document.getElementById('cashInputGroup').style.display = isExact ? 'none' : 'block';
        calculateFee();
    }

    function calculateFee() {
    const amt = parseFloat(document.getElementById('amount').value) || 0;
    const fee = amt * 0.01;
    const feeOption = document.getElementById('feeOption').value;
    const totalToPay = (feeOption === 'add') ? amt + fee : amt;
    const liveBreakdown = document.getElementById('liveBreakdown');

    // Live Breakdown Logic
    if (amt > 0) {
        liveBreakdown.style.display = 'block';
        liveBreakdown.innerHTML = `
            Fee (1%): <b>P${fee.toFixed(2)}</b><br>
            Total to Pay: <b>P${totalToPay.toFixed(2)}</b>
        `;
    } else {
        liveBreakdown.style.display = 'none';
    }

    // Sukli Logic
    const cashIn = parseFloat(document.getElementById('cashReceived').value) || 0;
    const sukliDiv = document.getElementById('sukliDisplay');
    if (!document.getElementById('isExact').checked && cashIn > totalToPay) {
        sukliDiv.innerHTML = "SUKLI: P" + (cashIn - totalToPay).toFixed(2);
    } else { sukliDiv.innerHTML = ""; }
}

    function showReview() {
    const name = document.getElementById('custName').value;
    const acc = document.getElementById('accNo').value;
    const amt = parseFloat(document.getElementById('amount').value) || 0;

    if(!name || !acc || amt <= 0) { alert("Pakikumpleto ang detalye."); return; }

    const fee = amt * 0.01;
    const feeSelect = document.getElementById('feeOption');
    const feeOptionText = feeSelect.options[feeSelect.selectedIndex].text; // Nakukuha ang text ng option
    const feeOptionValue = feeSelect.value;
    const total = (feeOptionValue === 'add') ? amt + fee : amt;

    let reviewHTML = `
        <div class="review-item"><span>Mode:</span><strong>${currentMode}</strong></div>
        <div class="review-item"><span>Name:</span><strong>${name}</strong></div>
        <div class="review-item"><span>GCash Number:</span><strong>${acc}</strong></div>
        <div class="review-item"><span>Amount:</span><strong>P${amt.toFixed(2)}</strong></div>
        <div class="review-item"><span>Fee Option:</span><strong style="font-size:11px; text-align:right;">${feeOptionText}</strong></div>
        <div class="review-item"><span>Service Fee:</span><strong>P${fee.toFixed(2)}</strong></div>
        <div class="review-item" style="border:none; font-size:18px; margin-top:10px;"><span>Total:</span><strong>P${total.toFixed(2)}</strong></div>
    `;

    document.getElementById('reviewContent').innerHTML = reviewHTML;
    
    // QR Logic... (mananatili ang dati mong code dito)
    if(currentMode === 'Cash Out') {
        document.getElementById('qrReviewArea').style.display = 'block';
        document.getElementById('qrInstructionReview').innerText = (feeOptionValue === 'add') 
            ? `Paki-send ang P${total.toFixed(2)}` : `Paki-send ang P${amt.toFixed(2)}`;
    } else {
        document.getElementById('qrReviewArea').style.display = 'none';
    }

    document.getElementById('stepReview').style.display = 'block';
}

    function hideReview() { document.getElementById('stepReview').style.display = 'none'; }

    function generateNumber() {
        if(!document.getElementById('termsAgree').checked) { alert("Please agree to the terms."); return; }
        
        // Simulating queue number generation
        const randomNum = Math.floor(Math.random() * 900) + 100;
        document.getElementById('numberDisplay').innerText = "G-" + randomNum;
        document.getElementById('stepSuccess').style.display = 'block';
    }
</script>

</body>
</html>
