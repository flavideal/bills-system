<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JPS Admin Panel - Butuan Hub</title>

  <link rel="icon" type="image/png" href="https://jerrickiosk.flavideal.com/logo/jpsk..png?v=2">
  <link rel="apple-touch-icon" href="https://jerrickiosk.flavideal.com/logo/admin.png?v=2">

  <link rel="manifest" href="manifest-admin.json?v=2">
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #1b431c; --gold: #ffc267; --bg: #0d0d0d; --card-bg: #1a1a1a; }
    body { font-family: 'Roboto', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; }
    .container { max-width: 600px; margin: 0 auto; }

    #login-box { max-width: 350px; margin: 80px auto; background: var(--card-bg); padding: 30px; border-radius: 15px; border: 2px solid var(--primary); text-align: center; }
    input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
    button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }

    #dashboard { display: none; }
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 15px; }
    .header h2 { font-family: 'Orbitron', sans-serif; color: var(--gold); font-size: 1rem; margin: 0; }
    
    table { width: 100%; border-collapse: collapse; }
    td { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; text-align: center; }
    tr:hover { background: #111; }
    
    .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
    .new { background: #ff9800; color: #000; }
    .calling { background: #2196F3; color: #fff; }
    .completed { background: #4CAF50; color: #fff; }

    /* MODAL BOX */
    #details-modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); overflow-y: auto; }
    .modal-content { background: #111; margin: 5% auto; padding: 20px; border: 1px solid var(--primary); width: 90%; max-width: 450px; border-radius: 15px; }
    .modal-header { 
  font-family: 'Roboto', sans-serif; /* Pinalitan ang Orbitron para luminaw */
  color: var(--gold); 
  border-bottom: 1px solid #333; 
  padding-bottom: 12px; 
  margin-bottom: 15px; 
  display: flex; 
  justify-content: space-between; 
  align-items: center; /* Para pantay ang Close at Text */
  font-size: 18px; /* Nilakihan para kitang-kita agad */
  font-weight: 700;
  letter-spacing: 0.5px;
}

#mod-queue {
  display: block;
  max-width: 80%; /* Para hindi siksikan sa Close button */
  line-height: 1.2;
}

    .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
    .stat-card { background: #222; padding: 10px; border-radius: 8px; border-left: 3px solid var(--gold); }
    .stat-card small { font-size: 9px; color: #aaa; text-transform: uppercase; }
    .stat-card div { font-size: 14px; font-weight: bold; color: var(--gold); font-family: 'Orbitron'; }

    .filter-box { background: var(--card-bg); padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; }
    .filter-box input { margin: 5px 0; padding: 8px; font-size: 12px; }
    .completed-list { border-top: 2px dashed #333; margin-top: 20px; padding-top: 10px; }
    .section-title { font-size: 10px; color: #666; margin-bottom: 10px; letter-spacing: 2px; }
    
   /* CSS FIX PARA LUMITAW ANG VALUE SA TABI NG LABEL */
    .detail-item { 
      margin-bottom: 8px; 
      font-size: 14px; 
      display: flex; 
      justify-content: space-between; 
      border-bottom: 1px solid #222; 
      padding-bottom: 8px; 
      align-items: center; 
    }
    
    .detail-item span { 
      color: var(--gold); 
      font-size: 10px; 
      text-transform: uppercase;
      width: 40%; /* Space para sa Label (e.g. Account Name) */
      flex-shrink: 0;
    }
    
    .detail-value {
      display: flex;
      align-items: center;
      justify-content: flex-end; /* Itutulak ang lahat sa kanan */
      width: 60%; 
      gap: 8px; /* Space sa pagitan ng Value at Button */
    }

    .detail-value b {
      color: white;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis; 
      flex-grow: 1; /* Pipilitin nito yung text na magpakita */
      text-align: right;
    }
    
    .copy-btn { 
      background: rgba(255, 194, 103, 0.2);
      color: var(--gold); 
      border: 1px solid var(--gold);
      padding: 4px 10px; 
      font-size: 10px; 
      border-radius: 4px; 
      cursor: pointer;
      flex-shrink: 0; /* Bawal itong lumaki o sumakop ng row */
      width: auto; /* Siguraduhin na hindi siya mag-100% width */
      font-weight: bold;
    }

    .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
    .btn-call { background: #2196F3; }
    .btn-recall { background: #9c27b0; }
    .btn-done { background: #4CAF50; grid-column: span 2; }
    
    .proof-img { width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid #444; display: block; min-height: 100px; background: #000; }
    .upload-box { background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px dashed var(--gold); margin-top: 10px; }

    .status-badge.new {
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0% { opacity: 1; }
  50% { opacity: 0.5; }
  100% { opacity: 1; }
}
  </style>
</head>
<body>

<audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<div class="container">
  <div id="login-box">
    <h3 style="color: var(--gold); font-family: 'Orbitron'; font-size: 14px;">JPS ADMIN</h3>
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Passcode">
    <button onclick="login()">LOGIN</button>
  </div>

  <div id="dashboard">
    <div class="header">
      <h2>BUTUAN HUB ADMIN</h2>
      <button onclick="logout()" style="width:auto; padding:5px 10px; background:#333; font-size:10px;">LOGOUT</button>
    </div>

    <div class="filter-box" style="display: flex; flex-direction: column; gap: 10px; border: 1px solid var(--gold);">
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <span style="font-family: 'Orbitron'; font-size: 12px; color: var(--gold);">HUB STATUS:</span>
    <div id="status-controls" style="display: flex; gap: 10px; width: 60%;">
      <button id="btn-open" onclick="setHubStatus('OPEN')" style="background: #4CAF50; font-size: 10px; padding: 8px;">OPEN</button>
      <button id="btn-close" onclick="setHubStatus('CLOSED')" style="background: #f44336; font-size: 10px; padding: 8px;">CLOSE</button>
    </div>
  </div>
  <button onclick="openMaintenanceModal()" style="background: #333; color: var(--gold); border: 1px solid var(--gold); font-size: 11px; padding: 10px;">⚙️ SERVICE MAINTENANCE SETTINGS</button>
</div>

    <div class="stats-container">
      <div class="stat-card"><small>Total Fees (Today)</small><div id="stat-fees">₱0</div></div>
      <div class="stat-card"><small>Total Transactions</small><div id="stat-count">0</div></div>
    </div>

    <div class="filter-box">
      <input type="text" id="searchQ" placeholder="Search Queue Number..." oninput="filterData()">
      <input type="date" id="searchDate" onchange="filterData()">
    </div>

    <div class="section-title">ACTIVE QUEUE</div>
    <div class="table-container">
      <table><tbody id="table-body"></tbody></table>
    </div>

    <div class="completed-list">
      <div class="section-title">COMPLETED TODAY</div>
      <table><tbody id="completed-body"></tbody></table>
    </div>
  </div>

<div id="details-modal">
  <div class="modal-content">
    <div class="modal-header">
      <span id="mod-queue">DETAILS</span>
      <span onclick="closeModal()" style="cursor:pointer; color:red;">[CLOSE]</span>
    </div>
    <div id="modal-body"></div>
    <div id="modal-footer" class="modal-actions"></div>
  </div>
</div>

<div id="maintenance-modal" style="display: none; position: fixed; z-index: 101; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); overflow-y: auto;">
  <div class="modal-content" style="max-width: 400px; margin: 15% auto;">
    <div class="modal-header">
      <span>MAINTENANCE CONTROL</span>
      <span onclick="closeMaintenanceModal()" style="cursor:pointer; color:red;">[CLOSE]</span>
    </div>
    <div id="maintenance-body">
      <style>
        .m-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #333; }
        .m-label { font-size: 13px; font-weight: bold; }
        .m-toggle { display: flex; gap: 5px; }
        .m-toggle button { width: 60px; padding: 8px; font-size: 10px; border: none; cursor: pointer; }
        .m-on { background: #4CAF50; color: white; }
        .m-off { background: #f44336; color: white; }
        .inactive { opacity: 0.3; }
      </style>
      
      <div class="m-row">
        <div class="m-label">GCash Cash-In (B2)</div>
        <div class="m-toggle">
          <button id="m-b2-open" onclick="updateServiceStatus('B2', 'OPEN')">OPEN</button>
          <button id="m-b2-close" onclick="updateServiceStatus('B2', 'CLOSED')">CLOSE</button>
        </div>
      </div>

      <div class="m-row">
        <div class="m-label">GCash Cash-Out (C2)</div>
        <div class="m-toggle">
          <button id="m-c2-open" onclick="updateServiceStatus('C2', 'OPEN')">OPEN</button>
          <button id="m-c2-close" onclick="updateServiceStatus('C2', 'CLOSED')">CLOSE</button>
        </div>
      </div>

      <div class="m-row">
        <div class="m-label">Aneco Bills (D2)</div>
        <div class="m-toggle">
          <button id="m-d2-open" onclick="updateServiceStatus('D2', 'OPEN')">OPEN</button>
          <button id="m-d2-close" onclick="updateServiceStatus('D2', 'CLOSED')">CLOSE</button>
        </div>
      </div>

      <div class="m-row" style="border-bottom: none;">
        <div class="m-label">E-Load Service (E2)</div>
        <div class="m-toggle">
          <button id="m-e2-open" onclick="updateServiceStatus('E2', 'OPEN')">OPEN</button>
          <button id="m-e2-close" onclick="updateServiceStatus('E2', 'CLOSED')">CLOSE</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let u = localStorage.getItem('admin_u') || "";
  let p = localStorage.getItem('admin_p') || "";
  let allData = [];
  let lastCount = 0; // Taga-bilang ng lumang transactions
  let isFirstLoad = true; // Para hindi tumunog sa unang load
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwwOsuWmpHe4b8hwDOj-byvDNzg9gnW2WDgL4J5Tbi-69ghbST5E_bS9Bl6q7CzgktC/exec"; 

  window.onload = function() { 
    if (u && p) { 
      showDashboard(); 
      loadData(); 
      requestNotifPermission(); // Hingin ang permission sa start
    } 
  };

  // --- NEW: Humingi ng Permission para sa Notifications ---
  function requestNotifPermission() {
    if ("Notification" in window) {
      Notification.requestPermission();
    }
  }

  function login() {
    let ui = document.getElementById('user').value;
    let pi = document.getElementById('pass').value;
    if (ui === "jerric_admin" && pi === "butuan2026") {
      u = ui; p = pi;
      localStorage.setItem('admin_u', u); localStorage.setItem('admin_p', p);
      showDashboard(); loadData();
      requestNotifPermission(); // Hingin din dito pagka-login
    } else { alert("Invalid!"); }
  }

  async function loadData() {
  try {
    const response = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({ action: "getTransactions", user: u, pass: p })
    });

    const res = await response.json();

    // IMPORTANT: I-save muna ang data sa allData variable
    if (res.data) {
      allData = res.data; 
    }

    // UPDATE HUB STATUS UI
    if (res.kioskStatus) {
        window.currentKioskStatus = res.kioskStatus; 
        
        // I-check kung object (multi-service) o string (main status)
        let mainStatus = (typeof res.kioskStatus === 'object') ? res.kioskStatus.main : res.kioskStatus;
        
        console.log("Hub Status fetched:", mainStatus);
        updateStatusUI(mainStatus); 
    }
      
    // NOTIFICATION LOGIC
    const currentActiveCount = allData.filter(row => (row[16] || "NEW").toUpperCase() !== "COMPLETED").length;

    if (!isFirstLoad && currentActiveCount > lastCount) {
      triggerAlert();
    }

    lastCount = currentActiveCount;
    isFirstLoad = false;
      
    // Refresh the table
    filterData(); 

  } catch (e) { 
    console.error("Load Data Error:", e); 
  }
}
  
  // --- NEW: Function para sa Tunog at Banner ---
  function triggerAlert() {
    // 1. Patunugin ang Audio
    const sound = document.getElementById('notifSound');
    if (sound) {
      sound.play().catch(e => console.log("Sound blocked: Click the page first."));
    }

    // 2. Ipakita ang Notification Banner (kung naka-install o nasa background)
    if (Notification.permission === "granted") {
      new Notification("JPS ADMIN: NEW QUEUE!", {
        body: "May bagong customer sa kiosk. I-check ang queue.",
        icon: "https://jerrickiosk.flavideal.com/logo/admin.png"
      });
    }
  }

  /* ... ang rest ng functions mo (logout, filterData, showDetails, etc.) ay mananatili ... */

  function logout() { localStorage.clear(); location.reload(); }
  function showDashboard() { document.getElementById('login-box').style.display='none'; document.getElementById('dashboard').style.display='block'; }

  function filterData() {
  const searchTerm = document.getElementById('searchQ').value.toUpperCase();
  const searchDateInput = document.getElementById('searchDate').value; 

  let activeHtml = "";
  let completedHtml = "";
  let totalFees = 0;
  let transCount = 0;

  // Kunin natin ang "Today" sa format na gamit sa Kiosk/Sheets para sa auto-sync
  const today = new Date();
  const dd = String(today.getDate()).padStart(2, '0');
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const yyyy = today.getFullYear();
  
  // Gagawa tayo ng dalawang format para sigurado
  const fmt1 = `${dd}/${mm}/${yyyy}`; // 19/04/2026
  const fmt2 = `${mm}/${dd}/${yyyy}`; // 04/19/2026

  allData.forEach((row, index) => {
    const qNo = row[1].toString();
    const status = (row[16] || "NEW").toUpperCase();
    const fullTimestamp = row[2] ? row[2].toString() : ""; 
    const fee = parseFloat(row[8]) || 0;

    const matchSearch = qNo.includes(searchTerm);
    
    // --- FLEXIBLE DATE LOGIC ---
    let matchDate = false;
    if (searchDateInput) {
      // Kung may piniling date sa calendar filter
      const [y, m, d] = searchDateInput.split('-');
      const selected = `${d}/${m}/${y}`;
      const selectedAlt = `${parseInt(m)}/${parseInt(d)}/${y}`; // M/D/YYYY (no leading zeros)
      matchDate = fullTimestamp.includes(selected) || fullTimestamp.includes(selectedAlt);
    } else {
      // DEFAULT: Ipakita lahat ng entries na may petsa ngayong araw (kahit anong format)
      matchDate = fullTimestamp.includes(fmt1) || fullTimestamp.includes(fmt2) || fullTimestamp.includes(yyyy);
    }

    if (matchSearch && matchDate) {
      let rowHtml = `
        <tr onclick="showDetails(${index})">
          <td style="font-weight:bold; color:var(--gold); font-size:18px;">${row[1]}</td>
          <td><span class="status-badge ${status.toLowerCase()}">${status}</span></td>
        </tr>`;

      if (status === "COMPLETED") {
        completedHtml += rowHtml;
        totalFees += fee;
        transCount++;
      } else {
        activeHtml += rowHtml;
      }
    }
  });

  document.getElementById('table-body').innerHTML = activeHtml || "<tr><td>No active queue</td></tr>";
  document.getElementById('completed-body').innerHTML = completedHtml || "<tr><td>No completed yet</td></tr>";
  document.getElementById('stat-fees').innerText = "₱" + totalFees.toLocaleString();
  document.getElementById('stat-count').innerText = transCount;
}

  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => {
      alert("Copied: " + text);
    });
  }

  function fixDriveUrl(url) {
    if (!url || !url.includes("id=")) return url;
    
    // Kunin ang ID ng file
    const id = url.split("id=")[1].split("&")[0];
    
    // Eto yung format na gumana sa g.html mo
    // Ang '0' sa dulo at 'googleusercontent' ay effective sa pag-display ng Direct Image
    return `https://googleusercontent.com/profile/picture/0${id}`;
  }

  function showDetails(index) {
    const row = allData[index];
    const type = row[4] ? row[4].toString().toLowerCase() : "";
    const gcashNum = row[6] ? row[6].toString().replace(/'/g, "") : "";
    
    // --- COLUMN MAPPING ---
    const timeStampC = row[2] || "N/A";
    const consentP = row[15] || "N/A"; // Consent (Column P)
    const providerD = row[3] || "";
    const typeE = row[4] || "";
    const accNameF = row[5] || "No Name";
    const amountH = row[7] || 0;
    const feeI = row[8] || 0;
    const feeOptionJ = row[9] || "N/A";

    // --- K, L, M, N, O MAPPING ---
    const cashInK = row[10] || 0;    // Cash In Amount
    const cashOutAddL = row[11] || 0; // Cash Out Add-on
    const cashOutDedM = row[12] || 0; // Cash Out Deduct
    const cashReceivedN = row[13] || 0; // Cash Received (from Customer)
    const sukliNetO = row[14] || 0;   // Sukli / Net Amount

    // --- FILE LINKS ---
    const viewS = row[18] || ""; // Customer Proof
    const viewT = row[19] || ""; // Admin Receipt
    const viewU = row[20] || ""; // Signature/Voucher
    
    // row[1] is Queue, row[0] is Customer Name (o kung ano man ang index 0 mo)
document.getElementById('mod-queue').innerHTML = `QUE#: ${row[1]} <br> <small style="color:white; font-size: 14px; font-weight: normal;">${row[0]}</small>`;
    
    let body = `
      <div class="detail-item"><span>Timestamp</span><b>${timeStampC}</b></div>
      <div class="detail-item" style="background: rgba(255, 194, 103, 0.1);"><span>Consent</span><b>${consentP}</b></div>
      
      <div class="detail-item"><span>Provider</span><b>${providerD}</b></div>
      <div class="detail-item"><span>Type</span><b>${typeE}</b></div>
      
      <div class="detail-item">
        <span>Account Name</span>
        <div class="detail-value"><b>${accNameF}</b><button class="copy-btn" onclick="copyToClipboard('${accNameF}')">COPY</button></div>
      </div>

      <div class="detail-item">
        <span>Account Number</span>
        <div class="detail-value"><b>${gcashNum}</b><button class="copy-btn" onclick="copyToClipboard('${gcashNum}')">COPY</button></div>
      </div>

      <div class="detail-item">
        <span>Amount</span>
        <div class="detail-value"><b>₱${amountH}</b><button class="copy-btn" onclick="copyToClipboard('${amountH}')">COPY</button></div>
      </div>

      <div class="detail-item"><span>Fee</span><b>₱${feeI}</b></div>
      <div class="detail-item"><span>Fee Option</span><b>${feeOptionJ}</b></div>

      <div class="detail-item"><span>Cash In (E-SEND NA AMOUNT)</span><div class="detail-value"><b>₱${cashInK}</b><button class="copy-btn" onclick="copyToClipboard('${cashInK}')">COPY</button></div></div>
      <div class="detail-item"><span>Cash Out (AMOUNT NA MATANGGAP SA GCASH/MAYA)</span><b>₱${cashOutAddL}</b></div>
      <div class="detail-item"><span>Cash Out (CASH NA IBIBIGAY)</span><b>₱${cashOutDedM}</b></div>
      <div class="detail-item"><span>Cash Received/Pay</span><b>₱${cashReceivedN}</b></div>
      <div class="detail-item" style="border-bottom: 2px solid var(--gold);"><span>Sukli / Net</span><b>₱${sukliNetO}</b></div>
    `;

    // --- PROOFS SECTION (CASH IN: S at T LANG) ---
    body += `<div style="margin-top:15px; border-top: 1px solid #333; padding-top: 15px; display: grid; gap: 10px;">`;

    if (type.includes("out")) {
      // Panatilihin ang dati mong logic para sa Cash Out (S at U)
      body += `<div><span style="font-size:10px; color:var(--gold);">CASHOUT PROOFS:</span><br>`;
      body += viewS ? `<button onclick="window.open('${viewS}')" style="background:#333; color:var(--gold); border:1px solid var(--gold); padding:10px; width:48%; border-radius:8px; margin-top:5px; font-weight:bold; cursor:pointer;">📂 VIEW SENT PROOF</button>` : "";
      body += viewU ? `<button onclick="window.open('${viewU}')" style="background:#1b431c; color:white; border:1px solid #4CAF50; padding:10px; width:48%; border-radius:8px; margin-top:5px; font-weight:bold; cursor:pointer;">📂 VIEW VOUCHER</button>` : "";
      body += `</div>`;
    } else {
      // CUSTOM LOGIC PARA SA CASH IN (Column S at T)
      body += `<div><span style="font-size:10px; color:var(--gold);">CASHIN ATTACHMENTS:</span><br>`;
      
      // Column S - Customer Proof (Kung meron silang in-upload sa kiosk)
      if (viewS) {
        body += `<button onclick="window.open('${viewS}')" style="background:#333; color:var(--gold); border:1px solid var(--gold); padding:12px; width:100%; border-radius:8px; margin-top:5px; font-weight:bold; cursor:pointer;">📂 VIEW CUSTOMER PROOF/VIEW BILL</button>`;
      }

      // Column T - Admin Receipt (Yung upload mo)
      if (viewT) {
        body += `<button onclick="window.open('${viewT}')" style="background:#1b431c; color:white; border:1px solid #4CAF50; padding:12px; width:100%; border-radius:8px; margin-top:5px; font-weight:bold; cursor:pointer;">✅ VIEW MY PROOF OF RECEIPT</button>`;
      }
      
      // Upload Box para sa Admin (Column T)
      body += `
        <div class="upload-box">
          <input type="file" id="admin-file" accept="image/*" style="display:block; margin:10px 0; font-size:12px;">
          <button id="up-btn" onclick="uploadAdminProof('${row[1]}')" style="background:var(--gold); color:black; padding:10px; font-size:12px; border-radius:5px; width:100%; font-weight:bold;">UPLOAD ADMIN RECEIPT (T)</button>
        </div>`;
      body += `</div>`;
    }

    body += `</div>`; 

    document.getElementById('modal-body').innerHTML = body;

  async function updateStatus(q, s) {
    // Papalitan natin ang text ng button para malaman na nagse-send
    const btn = event.target;
    const originalText = btn.innerText;
    btn.innerText = "SENDING...";
    btn.disabled = true;

    try {
      await fetch(SCRIPT_URL, { 
        method: "POST", 
        body: JSON.stringify({ action: "updateStatus", user: u, pass: p, queueNo: q, newStatus: s }) 
      });
      
      // [FIX] Mag-close lang kung "COMPLETED" (DONE button)
      if (s === 'COMPLETED') {
        closeModal();
      } else {
        alert(s + " sent!");
        btn.innerText = originalText;
        btn.disabled = false;
      }
      
      loadData(); // I-refresh ang listahan sa likod
    } catch (e) {
      alert("Error!");
      btn.innerText = originalText;
      btn.disabled = false;
    }
  }

  async function callAgain(q) {
    const btn = event.target;
    btn.innerText = "RECALLING...";
    btn.disabled = true;

    try {
      await fetch(SCRIPT_URL, { 
        method: "POST", 
        body: JSON.stringify({ action: "updateStatus", user: u, pass: p, queueNo: q, newStatus: "CALLING", note: "CALL AGAIN" }) 
      });
      
      alert("Recall signal sent!");
      // [FIX] Tinanggal ang closeModal() dito para hindi mag-close
      btn.innerText = "CALL AGAIN";
      btn.disabled = false;
      loadData();
    } catch (e) {
      alert("Error!");
      btn.innerText = "CALL AGAIN";
      btn.disabled = false;
    }
  }

  async function uploadAdminProof(qNo) {
    const fileInput = document.getElementById('admin-file');
    if (fileInput.files.length === 0) return alert("Pili muna file");
    
    const btn = document.getElementById('up-btn');
    const originalText = btn.innerText;
    
    btn.innerText = "UPLOADING..."; 
    btn.disabled = true;

    const reader = new FileReader();
    reader.onload = async function(e) {
      try {
        const response = await fetch(SCRIPT_URL, { 
          method: "POST", 
          body: JSON.stringify({ 
            action: "uploadAdminReceipt", 
            user: u, 
            pass: p, 
            queueNo: qNo, 
            file: e.target.result 
          }) 
        });
        
        const res = await response.json();
        
        if (res.result === "success") {
          alert("Upload Success!");
          // [FIX] Tinanggal ang closeModal() dito para manatiling bukas
          btn.innerText = "UPLOAD AGAIN?"; 
          btn.disabled = false;
          loadData(); // I-refresh ang data sa background para lumabas yung [View My Upload] link
        } else {
          alert("Error: " + res.message);
          btn.innerText = originalText;
          btn.disabled = false;
        }
      } catch (err) {
        alert("Upload Failed!");
        btn.innerText = originalText;
        btn.disabled = false;
      }
    };
    reader.readAsDataURL(fileInput.files[0]);
  }

  // --- FUNCTION PARA MAG-SET NG STATUS (OPEN/CLOSED) ---
async function setHubStatus(newStatus) {
    const btnOpen = document.getElementById('btn-open');
    const btnClose = document.getElementById('btn-close');
    
    // Visual feedback habang naglo-load
    const originalText = newStatus === 'OPEN' ? "OPENING..." : "CLOSING...";
    if(newStatus === 'OPEN') btnOpen.innerText = originalText; else btnClose.innerText = originalText;

    try {
        const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ 
                action: "updateKioskStatus", 
                user: u, 
                pass: p, 
                status: newStatus 
            })
        });

        const res = await response.json();
        if (res.result === "success") {
            alert("Hub is now " + newStatus);
            updateStatusUI(newStatus);
        }
    } catch (e) {
        alert("Failed to update status!");
    } finally {
        btnOpen.innerText = "OPEN";
        btnClose.innerText = "CLOSE";
    }
}

function updateStatusUI(status) {
    const btnOpen = document.getElementById('btn-open');
    const btnClose = document.getElementById('btn-close');
    if (!btnOpen || !btnClose) return;

    const current = String(status || "").trim().toUpperCase();

    if (current === "OPEN") {
        // Highlight OPEN
        btnOpen.style.opacity = "1";
        btnOpen.style.border = "2px solid #ffc267"; 
        btnOpen.style.boxShadow = "0 0 10px #4CAF50";
        
        // Dim CLOSE
        btnClose.style.opacity = "0.3";
        btnClose.style.border = "none";
        btnClose.style.boxShadow = "none";
    } 
    else if (current.includes("CLOSE")) { // Para pasok ang "CLOSE" o "CLOSED"
        // Highlight CLOSE
        btnClose.style.opacity = "1";
        btnClose.style.border = "2px solid #ffc267";
        btnClose.style.boxShadow = "0 0 10px #f44336";
        
        // Dim OPEN
        btnOpen.style.opacity = "0.3";
        btnOpen.style.border = "none";
        btnOpen.style.boxShadow = "none";
    }
}

async function updateServiceStatus(cell, newStatus) {
    const btnOpen = document.getElementById(`m-${cell.toLowerCase()}-open`);
    const btnClose = document.getElementById(`m-${cell.toLowerCase()}-close`);
    
    const targetBtn = newStatus === 'OPEN' ? btnOpen : btnClose;
    const originalText = targetBtn.innerText;
    targetBtn.innerText = "...";
    
    try {
        const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ 
                action: "updateSpecificStatus", 
                user: u, pass: p, 
                targetCell: cell, 
                status: newStatus 
            })
        });

        const res = await response.json();
        if (res.result === "success") {
            // I-update ang global variable para synced pa rin
            const keyMap = { 'B2':'cashIn', 'C2':'cashOut', 'D2':'aneco', 'E2':'load' };
            if (window.currentKioskStatus) window.currentKioskStatus[keyMap[cell]] = newStatus;
            
            // I-refresh ang kulay ng buttons sa modal
            updateMaintenanceUI(window.currentKioskStatus);
        }
    } catch (e) {
        alert("Failed!");
    } finally {
        targetBtn.innerText = originalText;
    }
}
  
function updateMaintenanceUI(statusObj) {
    // Listahan ng cells at ang katumbas na status key mula sa Apps Script
    const mapping = {
        'B2': statusObj.cashIn,
        'C2': statusObj.cashOut,
        'D2': statusObj.aneco,
        'E2': statusObj.load
    };

    for (const cell in mapping) {
        const currentStatus = mapping[cell]; // "OPEN" or "CLOSED"
        const btnOpen = document.getElementById(`m-${cell.toLowerCase()}-open`);
        const btnClose = document.getElementById(`m-${cell.toLowerCase()}-close`);

        if (btnOpen && btnClose) {
            if (currentStatus === "OPEN") {
                btnOpen.style.opacity = "1";
                btnOpen.style.border = "2px solid white";
                btnClose.style.opacity = "0.3";
                btnClose.style.border = "none";
            } else {
                btnClose.style.opacity = "1";
                btnClose.style.border = "2px solid white";
                btnOpen.style.opacity = "0.3";
                btnOpen.style.border = "none";
            }
        }
    }
}
