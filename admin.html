<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JPS Admin Panel - Detailed View</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #1b431c; --gold: #ffc267; --bg: #0d0d0d; --card-bg: #1a1a1a; }
    body { font-family: 'Roboto', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; }
    .container { max-width: 1000px; margin: 0 auto; }

    /* Login Box */
    #login-box { max-width: 350px; margin: 80px auto; background: var(--card-bg); padding: 30px; border-radius: 15px; border: 2px solid var(--primary); text-align: center; }
    input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
    button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }

    /* Dashboard */
    #dashboard { display: none; }
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 15px; }
    .header h2 { font-family: 'Orbitron', sans-serif; color: var(--gold); font-size: 1.1rem; margin: 0; }
    
    /* Table Styling */
    .table-container { background: var(--card-bg); border-radius: 10px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: var(--primary); color: white; padding: 15px; text-align: left; }
    td { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; }
    tr:hover { background: #222; }
    
    .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; }
    .new { background: #ff9800; color: #000; }
    .calling { background: #2196F3; color: #fff; }
    .completed { background: #4CAF50; color: #fff; }

    .actions { display: flex; gap: 5px; }
    .btn-call { background: #2196F3; border:none; color:white; padding: 8px; border-radius: 4px; font-size: 11px; cursor: pointer;}
    .btn-done { background: #4CAF50; border:none; color:white; padding: 8px; border-radius: 4px; font-size: 11px; cursor: pointer;}

    /* MODAL / DETAILS BOX */
    #details-modal { 
      display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; 
      background: rgba(0,0,0,0.9); overflow-y: auto;
    }
    .modal-content { 
      background: #1a1a1a; margin: 5% auto; padding: 20px; border: 1px solid var(--gold); 
      width: 90%; max-width: 500px; border-radius: 15px; 
    }
    .modal-header { font-family: 'Orbitron'; color: var(--gold); border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; }
    .detail-item { margin-bottom: 10px; font-size: 14px; border-bottom: 1px solid #222; padding-bottom: 5px; }
    .detail-item span { color: var(--gold); font-weight: bold; display: block; font-size: 11px; text-transform: uppercase; }

    @media screen and (max-width: 600px) {
      thead { display: none; }
      tr { display: block; margin-bottom: 10px; border: 1px solid #333; border-radius: 8px; }
      td { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #222; }
      td::before { content: attr(data-label); font-weight: bold; color: var(--gold); font-size: 11px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div id="login-box">
    <h3 style="color: var(--gold); font-family: 'Orbitron';">ADMIN LOGIN</h3>
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Passcode">
    <button onclick="login()">ENTER PANEL</button>
  </div>

  <div id="dashboard">
    <div class="header">
      <h2>JPS ADMIN PANEL</h2>
      <button onclick="logout()" style="width:auto; padding:5px 10px; background:#a32a2a; font-size:12px;">LOGOUT</button>
    </div>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Queue</th>
            <th>Name</th>
            <th>Type</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="details-modal">
  <div class="modal-content">
    <div class="modal-header">
      <span id="mod-queue">QUEUE DETAILS</span>
      <span onclick="closeModal()" style="cursor:pointer; color:red;">[X]</span>
    </div>
    <div id="modal-body"></div>
    <button onclick="closeModal()" style="margin-top:20px; background:#333;">CLOSE</button>
  </div>
</div>

<script>
  let u = localStorage.getItem('admin_u') || "";
  let p = localStorage.getItem('admin_p') || "";
  let allData = []; // Dito itatago ang full details
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwwOsuWmpHe4b8hwDOj-byvDNzg9gnW2WDgL4J5Tbi-69ghbST5E_bS9Bl6q7CzgktC/exec"; 

  window.onload = function() { if (u && p) { showDashboard(); loadData(); } };

  function login() {
    let ui = document.getElementById('user').value;
    let pi = document.getElementById('pass').value;
    if (ui === "jerric_admin" && pi === "butuan2026") {
      u = ui; p = pi;
      localStorage.setItem('admin_u', u); localStorage.setItem('admin_p', p);
      showDashboard(); loadData();
    } else { alert("Invalid!"); }
  }

  function logout() { localStorage.clear(); location.reload(); }
  function showDashboard() { document.getElementById('login-box').style.display='none'; document.getElementById('dashboard').style.display='block'; }

  async function loadData() {
    try {
      const response = await fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({ action: "getTransactions", user: u, pass: p })
      });
      const res = await response.json();
      if (res.result === "success") {
        allData = res.data; // Save data for modal
        let html = "";
        allData.forEach((row, index) => {
          let st = row[13] || "NEW";
          html += `<tr onclick="showDetails(${index})">
            <td data-label="Queue" style="font-weight:bold; color:var(--gold)">${row[1]}</td>
            <td data-label="Name">${row[0]}</td>
            <td data-label="Type">${row[4]}</td>
            <td data-label="Status"><span class="status-badge ${st.toLowerCase()}">${st}</span></td>
            <td data-label="Actions">
              <div class="actions" onclick="event.stopPropagation()">
                <button class="btn-call" onclick="update('${row[1]}', 'CALLING')">CALL</button>
                <button class="btn-done" onclick="update('${row[1]}', 'COMPLETED')">DONE</button>
              </div>
            </td>
          </tr>`;
        });
        document.getElementById('table-body').innerHTML = html;
      }
    } catch (e) { console.error(e); }
  }

  function showDetails(index) {
    const row = allData[index];
    document.getElementById('mod-queue').innerText = "DETAILS: " + row[1];
    let body = `
      <div class="detail-item"><span>Customer Name</span>${row[0]}</div>
      <div class="detail-item"><span>Transaction Type</span>${row[4]}</div>
      <div class="detail-item"><span>Amount</span>₱${row[7]}</div>
      <div class="detail-item"><span>Total to Pay</span>₱${row[10]}</div>
      <hr style="border:0; border-top:1px solid #333">
      <div class="detail-item">
        <span>Admin Proof (Column Q)</span>
        ${row[16] ? `<a href="${row[16]}" target="_blank" style="color:cyan">View Saved Proof</a>` : "No proof uploaded yet"}
      </div>
      <div style="margin-top:15px; padding:10px; border:1px dashed var(--gold); border-radius:5px;">
        <span style="font-size:11px; color:var(--gold); font-weight:bold;">UPLOAD RECEIPT/PROOF:</span>
        <input type="file" id="admin-file" accept="image/*" style="font-size:12px; margin:5px 0;">
        <button id="upload-btn" onclick="uploadAdminProof('${row[1]}')" style="background:var(--gold); color:black; padding:5px; font-size:12px;">UPLOAD NOW</button>
      </div>
    `;
    document.getElementById('modal-body').innerHTML = body;
    document.getElementById('details-modal').style.display = 'block';
  }

  async function uploadAdminProof(qNo) {
    const fileInput = document.getElementById('admin-file');
    const btn = document.getElementById('upload-btn');
    
    if (fileInput.files.length === 0) {
      alert("Pumili muna ng file!");
      return;
    }

    btn.innerText = "UPLOADING...";
    btn.disabled = true;

    const file = fileInput.files[0];
    const reader = new FileReader();
    
    reader.onload = async function(e) {
      const base64 = e.target.result;
      try {
        const response = await fetch(SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify({ 
            action: "uploadAdminReceipt", 
            user: u, 
            pass: p, 
            queueNo: qNo, 
            file: base64 
          })
        });
        const res = await response.json();
        if (res.result === "success") {
          alert("Uploaded and saved to Column Q!");
          closeModal();
          loadData();
        }
      } catch (err) {
        alert("Upload failed!");
      } finally {
        btn.innerText = "UPLOAD NOW";
        btn.disabled = false;
      }
    };
    reader.readAsDataURL(file);
  }
  
  function closeModal() { document.getElementById('details-modal').style.display = 'none'; }

  async function update(q, s) {
    try {
      await fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({ action: "updateStatus", user: u, pass: p, queueNo: q, newStatus: s })
      });
      loadData();
    } catch (e) { alert("Error"); }
  }

  setInterval(() => { if(u) loadData(); }, 20000);
</script>
</body>
</html>
