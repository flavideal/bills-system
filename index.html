<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLAVIDEAL | Smart Kiosk</title>
    <style>
        :root { --dark-green: #1b431c; --orange-yellow: #ffc267; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .kiosk-container { width: 100%; max-width: 500px; }
        
        /* Dashboard */
        .header { text-align: center; margin-bottom: 20px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .menu-item { 
            background: white; padding: 15px 5px; border-radius: 15px; text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; border: 2px solid transparent;
        }
        .menu-item img { width: 45px; height: 45px; object-fit: contain; margin-bottom: 8px; }
        .menu-item span { display: block; font-size: 11px; font-weight: bold; color: var(--dark-green); }

        /* Form Section */
        #formSection { 
            display: none; background: white; padding: 25px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 8px solid var(--dark-green);
        }
        .back-btn { background: none; border: none; color: var(--dark-green); font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        
        /* Inputs */
        .field-group { margin-bottom: 15px; }
        label { font-size: 12px; font-weight: bold; color: #555; display: block; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .type-btn { padding: 12px; border: 2px solid #ddd; border-radius: 10px; text-align: center; font-weight: bold; cursor: pointer; }
        .type-btn.active { background: var(--dark-green); color: white; border-color: var(--dark-green); }

        #submitBtn { width: 100%; padding: 18px; background: var(--dark-green); color: var(--orange-yellow); border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .qr-box { background: #fff9e6; padding: 15px; border-radius: 10px; text-align: center; margin-top: 10px; border: 1px dashed var(--orange-yellow); }
        #result { display: none; text-align: center; background: white; padding: 40px 20px; border-radius: 20px; }
    </style>
</head>
<body>

<div class="kiosk-container">
    <div class="header" id="mainHeader">
        <h1 style="color: var(--dark-green); margin:0;">FLAVIDEAL</h1>
        <p>Choose a service to continue</p>
    </div>

    <div class="menu-grid" id="menuGrid">
        <div class="menu-item" onclick="initForm('GCASH')"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/GCash_logo.svg/1200px-GCash_logo.svg.png"><span>GCASH</span></div>
        <div class="menu-item" onclick="initForm('MAYA')"><img src="https://getlogovector.com/wp-content/uploads/2022/04/maya-philippines-logo-vector.png"><span>MAYA</span></div>
        <div class="menu-item" onclick="initForm('PALAWAN')"><img src="https://www.palawanpawnshop.com/assets/images/logo.png"><span>PALAWAN</span></div>
        <div class="menu-item" onclick="initForm('ANECO')"><img src="https://via.placeholder.com/50?text=ANECO"><span>ANECO</span></div>
        <div class="menu-item" onclick="initForm('WATER')"><img src="https://via.placeholder.com/50?text=WATER"><span>WATER DIST.</span></div>
        <div class="menu-item" onclick="initForm('LOAD')"><img src="https://via.placeholder.com/50?text=LOAD"><span>E-LOAD</span></div>
    </div>

    <div id="formSection">
        <button class="back-btn" onclick="location.reload()">← BACK</button>
        <h2 id="formTitle" style="color: var(--dark-green); margin: 0 0 20px 0;">SERVICE</h2>
        
        <form id="kioskForm">
            <div id="dynamicInputs"></div>

            <div id="commonFields">
                <div class="field-group">
                    <label>Amount</label>
                    <input type="number" id="amount" placeholder="0.00" oninput="updateTotal()" required>
                    <div id="feeText" style="font-size: 12px; color: var(--dark-green); font-weight: bold; margin-top: 5px;"></div>
                </div>
            </div>

            <div id="qrArea" style="display:none;" class="qr-box">
                <p style="font-size: 11px; font-weight:bold;">SCAN QR TO PAY</p>
                <img src="YOUR_QR_URL" style="width: 150px;">
                <input type="text" id="refNo" placeholder="Reference Number" style="margin-top:10px;">
            </div>

            <button type="submit" id="submitBtn">CONFIRM</button>
        </form>
    </div>

    <div id="result">
        <h2 style="color: var(--dark-green);">SUCCESS!</h2>
        <p>Priority Number:</p>
        <div style="font-size: 70px; font-weight: 900; color: var(--dark-green);" id="qNum">---</div>
        <p style="background: var(--orange-yellow); padding: 15px; border-radius: 10px; font-weight: bold;">PLEASE WAIT FOR YOUR NUMBER TO BE CALLED</p>
        <button onclick="location.reload()" style="margin-top:20px; background:none; border:1px solid #ccc; padding:10px; border-radius:8px;">New Transaction</button>
    </div>
</div>

<script>
    const scriptURL = 'YOUR_APPS_SCRIPT_URL';
    let currentService = "";
    let currentType = "Cash In";

    function initForm(service) {
        currentService = service;
        document.getElementById('menuGrid').style.display = 'none';
        document.getElementById('mainHeader').style.display = 'none';
        document.getElementById('formSection').style.display = 'block';
        document.getElementById('formTitle').innerText = service;
        
        renderFields(service);
    }

    function renderFields(service) {
        const container = document.getElementById('dynamicInputs');
        let html = `
            <div class="field-group">
                <label>Customer Full Name</label>
                <input type="text" id="custName" placeholder="Enter Name" required>
            </div>
        `;

        if (service === 'GCASH' || service === 'MAYA') {
            html += `
                <label>Transaction Type</label>
                <div class="btn-group">
                    <div class="type-btn active" id="tIn" onclick="toggleType('Cash In')">Cash In</div>
                    <div class="type-btn" id="tOut" onclick="toggleType('Cash Out')">Cash Out</div>
                </div>
                <div class="field-group">
                    <label>Mobile Number</label>
                    <input type="number" id="accNo" placeholder="09XXXXXXXXX" required>
                </div>
            `;
        } else if (service === 'ANECO') {
            html += `
                <div class="field-group"><label>Account Number</label><input type="text" id="accNo" required></div>
                <div class="field-group"><label>Meter Number</label><input type="text" id="meterNo" required></div>
            `;
        } else if (service === 'PALAWAN') {
            html += `
                <div class="field-group"><label>Receiver Name</label><input type="text" id="receiver" required></div>
                <div class="field-group"><label>CP Number</label><input type="number" id="accNo" required></div>
            `;
        } else if (service === 'WATER') {
            html += `
                <div class="field-group"><label>Account No.</label><input type="text" id="accNo" required></div>
                <div class="field-group"><label>Address</label><input type="text" id="address"></div>
            `;
        } else {
            html += `<div class="field-group"><label>Mobile Number</label><input type="number" id="accNo" required></div>`;
        }

        container.innerHTML = html;
        toggleType('Cash In'); // Reset type display
    }

    function toggleType(type) {
        currentType = type;
        if(document.getElementById('tIn')) {
            document.getElementById('tIn').className = (type === 'Cash In') ? 'type-btn active' : 'type-btn';
            document.getElementById('tOut').className = (type === 'Cash Out') ? 'type-btn active' : 'type-btn';
            
            // Show QR only for GCash/Maya Cash Out
            const qr = document.getElementById('qrArea');
            qr.style.display = (type === 'Cash Out' && (currentService === 'GCASH' || currentService === 'MAYA')) ? 'block' : 'none';
        }
        updateTotal();
    }

    function updateTotal() {
        const amt = parseFloat(document.getElementById('amount').value) || 0;
        const fee = amt * 0.01;
        document.getElementById('feeText').innerText = `Total with 1% Fee: P${(amt + fee).toLocaleString()}`;
    }

    document.getElementById('kioskForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = "PRINTER BUSY...";
        btn.disabled = true;

        const payload = {
            name: document.getElementById('custName').value,
            service: currentService,
            type: currentType,
            account: document.getElementById('accNo') ? document.getElementById('accNo').value : "",
            amount: document.getElementById('amount').value,
            extra: document.getElementById('meterNo') ? "Meter: " + document.getElementById('meterNo').value : ""
        };

        fetch(scriptURL, { method: 'POST', body: JSON.stringify(payload) })
        .then(res => res.json())
        .then(data => {
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            document.getElementById('qNum').innerText = data.queueNumber;
        });
    });
</script>
</body>
</html>
