<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Your Experience - Flavi Deal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        h2 { color: #1b4332; margin-bottom: 10px; }
        .stars { font-size: 45px; color: #ddd; margin: 20px 0; cursor: pointer; }
        .star-active { color: #ffc107; }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 10px; box-sizing: border-box; font-family: inherit; resize: none; margin-bottom: 20px; }
        .btn-submit { width: 100%; padding: 15px; background: #1b4332; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-skip { background: none; border: none; color: #888; margin-top: 15px; cursor: pointer; text-decoration: underline; }
        
        /* Privacy Notice Style */
        .privacy-note { font-size: 11px; color: #999; margin-top: 20px; font-style: italic; border-top: 1px solid #eee; pt: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="welcomeText">How's your experience?</h2>

    <div class="stars" id="starGroup">
        <span onclick="setRating(1)">★</span><span onclick="setRating(2)">★</span><span onclick="setRating(3)">★</span><span onclick="setRating(4)">★</span><span onclick="setRating(5)">★</span>
    </div>

    <textarea id="comment" rows="3" placeholder="Tell us more about your experience... (Optional)"></textarea>

    <button class="btn-submit" onclick="submitReview()">SUBMIT REVIEW</button>
    <button class="btn-skip" onclick="goHome()">No thanks, skip this</button>

    <div class="privacy-note">
        Privacy Note: To protect your data, your name and queue number will be partially hidden (e.g., J***n, G***01) when displayed on our public Review Page.
    </div>
</div>

<script>
    let currentRating = 0;
    let rawName = "Customer";
    let rawQueue = "N/A";

    // AGRESSIVE CAPTURE: Ito ang sasalo habang binubura ng finishTransaction ang data
    function captureData() {
        const urlParams = new URLSearchParams(window.location.search);
        
        // Unahin ang URL (pinaka-safe), pagkatapos ay ang transfer keys, huli ang original keys
        rawName = urlParams.get('name') || localStorage.getItem('reviewerName') || localStorage.getItem('custName') || "Customer";
        rawQueue = urlParams.get('q') || localStorage.getItem('reviewerQueue') || localStorage.getItem('savedQueueNumber') || "N/A";
        serviceFromStorage = urlParams.get('service') || localStorage.getItem('reviewerService') || "GCASH";

        // I-lock agad natin sa bagong temporary keys para hindi na mabura!
        if (rawName !== "Customer") localStorage.setItem('locked_Name', rawName);
        if (rawQueue !== "N/A") localStorage.setItem('locked_Queue', rawQueue);
    }

    // Tawagin agad ang captureData bago pa mag-load ang page elements
    captureData();

    // Gamitin ang naka-lock na data para sa display
    const finalName = localStorage.getItem('locked_Name') || rawName;
    const finalQueue = localStorage.getItem('locked_Queue') || rawQueue;

    // 2. RESTRICTION
    if (finalName === "Customer" && finalQueue === "N/A") {
        window.location.href = 'index.html';
    }

    // 3. DISPLAY (Gagamit ng finalName)
    window.addEventListener('DOMContentLoaded', (event) => {
        if(finalName !== "Customer") {
            document.getElementById('welcomeText').innerText = "Hi " + finalName + ", how was it?";
        }
    });

    // --- DITO NA ANG MASKING (Gamitin ang finalName at finalQueue) ---
    function maskString(str, type) {
        if (!str || str === "N/A" || str === "Customer") return str;
        return type === "name" 
            ? str[0] + "***" + str[str.length - 1] 
            : str.substring(0, 1) + "***" + str.slice(-1);
    }

    // SA SUBMIT REVIEW, GAMITIN ANG finalName at finalQueue

            queueNo: maskString(finalQueue, "queue"),

        };

    }
</script>
</body>
</html>
