<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Your Experience - Flavi Deal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        h2 { color: #1b4332; margin-bottom: 10px; }
        .stars { font-size: 45px; color: #ddd; margin: 20px 0; cursor: pointer; }
        .star-active { color: #ffc107; }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 10px; box-sizing: border-box; font-family: inherit; resize: none; margin-bottom: 20px; }
        .btn-submit { width: 100%; padding: 15px; background: #1b4332; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-skip { background: none; border: none; color: #888; margin-top: 15px; cursor: pointer; text-decoration: underline; }
        
        /* Privacy Notice Style */
        .privacy-note { font-size: 11px; color: #999; margin-top: 20px; font-style: italic; border-top: 1px solid #eee; pt: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="welcomeText">How's your experience?</h2>
    <p style="color: #666; font-size: 14px;">Your feedback helps us improve!</p>

    <div class="stars" id="starGroup">
        <span onclick="setRating(1)">★</span><span onclick="setRating(2)">★</span><span onclick="setRating(3)">★</span><span onclick="setRating(4)">★</span><span onclick="setRating(5)">★</span>
    </div>

    <textarea id="comment" rows="3" placeholder="Tell us more about your experience... (Optional)"></textarea>

    <button class="btn-submit" onclick="submitReview()">SUBMIT REVIEW</button>
    <button class="btn-skip" onclick="goHome()">No thanks, skip this</button>

    <div class="privacy-note">
        Privacy Note: To protect your data, your name and queue number will be partially hidden (e.g., J***n, G***01) when displayed on our public Review Page.
    </div>
</div>

<script>
    let currentRating = 0;

    // 1. KUNIN ang data - May back-up keys tayo para siguradong hindi "Customer" ang lalabas
    const reviewerName = localStorage.getItem('reviewerName') || localStorage.getItem('custName') || "Customer";
    const reviewerQueue = localStorage.getItem('reviewerQueue') || localStorage.getItem('savedQueueNumber') || "N/A";
    
    // Hanapin ang service (Gcash, Aneco, etc.)
    const serviceUsed = localStorage.getItem('reviewerService') || "GCASH"; 

    // 2. I-display ang pangalan - Mas malinaw na check
    const welcomeText = document.getElementById('welcomeText');
    if(reviewerName && reviewerName !== "Customer") {
        welcomeText.innerText = `Hi ${reviewerName}, how was it?`;
    } else {
        welcomeText.innerText = "How's your experience?";
    }

    // 3. RESTRICTION: I-check kung galing ba talaga sa transaction
    // Kung walang name at walang queue, balik sa index para iwas spam
    if (reviewerName === "Customer" && reviewerQueue === "N/A") {
        console.log("No transaction data found, redirecting...");
        // window.location.href = 'index.html'; // I-uncomment mo ito kapag tapos ka na mag-test
    }

    // --- STARS LOGIC (Huwag baguhin) ---
    function setRating(n) {
        currentRating = n;
        const stars = document.querySelectorAll('#starGroup span');
        stars.forEach((star, index) => {
            star.classList.toggle('star-active', index < n);
        });
    }

    // --- SUBMIT LOGIC ---
    async function submitReview() {
        if (currentRating === 0) {
            alert("Please select a star rating.");
            return;
        }

        const btnSubmit = document.querySelector('.btn-submit');
        const comment = document.getElementById('comment').value;
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwwOsuWmpHe4b8hwDOj-byvDNzg9gnW2WDgL4J5Tbi-69ghbST5E_bS9Bl6q7CzgktC/exec";

        btnSubmit.disabled = true;
        btnSubmit.innerText = "Saving feedback...";

        const reviewData = {
            action: "saveReview",
            customerName: reviewerName,
            queueNo: reviewerQueue,
            serviceType: serviceUsed, 
            rating: currentRating,
            message: comment,
            timestamp: new Date().toLocaleString()
        };

        try {
            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors", 
                body: JSON.stringify(reviewData),
                headers: { "Content-Type": "text/plain;charset=utf-8" }
            });

            alert("Thank you! Your feedback has been saved.");
            goHome();
        } catch (err) {
            btnSubmit.disabled = false;
            btnSubmit.innerText = "SUBMIT REVIEW";
            alert("Error saving review.");
        }
    }

    function goHome() {
        localStorage.clear();
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
