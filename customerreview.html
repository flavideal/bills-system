<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Reviews -JERRIC Personal Assistance Service</title>
    <style>
        :root { 
            --premium-green: #1b431c; 
            --soft-green: #e8f5e9;
            --gold: #ffc267; 
        }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--premium-green); margin-bottom: 5px; font-weight: 800; }
        
        .review-card { 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            margin-bottom: 20px; 
            border: 1px solid #eee;
        }
        .reviewer-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .reviewer-name { font-weight: 800; color: var(--premium-green); font-size: 16px; }
        .q-tag { font-size: 10px; background: #f0f0f0; padding: 2px 8px; border-radius: 10px; color: #777; font-weight: bold; }
        
        .service-badge {
            display: inline-block;
            background: var(--soft-green);
            color: var(--premium-green);
            font-size: 10px;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 6px;
            border: 1px solid #c8e6c9;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stars { color: #ffc107; font-size: 18px; margin-bottom: 12px; }
        .comment { font-size: 15px; line-height: 1.6; color: #444; font-style: italic; }
        .date { font-size: 11px; color: #bbb; margin-top: 15px; border-top: 1px dashed #eee; padding-top: 10px; }
        
        .loading { text-align: center; color: #888; padding: 50px; }
        .no-reviews { text-align: center; padding: 50px; color: #888; }
        .back-btn { 
            display: inline-block; 
            margin-bottom: 20px; 
            text-decoration: none; 
            color: var(--premium-green); 
            font-weight: bold; 
            font-size: 14px; 
            background: white;
            padding: 8px 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .verified-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #2e7d32;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .verified-icon {
            background: #2e7d32;
            color: white;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
        }
        .admin-reply {
    background: #f1f8e9; /* Light green background */
    border-left: 4px solid var(--premium-green);
    padding: 12px;
    margin-top: 15px;
    border-radius: 8px;
    font-size: 13px;
}
.admin-label {
    display: block;
    font-weight: 800;
    color: var(--premium-green);
    font-size: 11px;
    text-transform: uppercase;
    margin-bottom: 5px;
}
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">← Back to Kiosk</a>
    <div class="header">
        <h1>Community Feedback</h1>
        <p style="color: #666; font-size: 14px;">Real stories from our customers in Butuan City</p>
    </div>

    <div id="reviewsList">
        <div class="loading">
            <div style="margin-bottom: 10px;">Checking latest feedback...</div>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwwOsuWmpHe4b8hwDOj-byvDNzg9gnW2WDgL4J5Tbi-69ghbST5E_bS9Bl6q7CzgktC/exec";

    // FUNCTION PARA SA MASKING (Privacy)
    function maskString(str, type) {
        if (!str || str === "N/A" || str === "Customer") return str;
        if (type === "name") {
            // Halimbawa: Jerric Dela Cruz -> J***z
            return str[0] + "***" + str[str.length - 1];
        } else {
            // Halimbawa: G-001 -> G***1
            return str.substring(0, 1) + "***" + str.slice(-1);
        }
    }

    async function loadReviews() {
        try {
            const response = await fetch(`${WEB_APP_URL}?action=getPublicReviews&t=${Date.now()}`);
            const result = await response.json();
            const listDiv = document.getElementById('reviewsList');
            
            if (!result.data || result.data.length === 0) {
                listDiv.innerHTML = '<div class="no-reviews">No feedback yet. Be the first to share your experience!</div>';
                return;
            }

            listDiv.innerHTML = ''; 
            
            result.data.forEach(rev => {
    const maskedName = maskString(rev.customerName, "name");
    const maskedQueue = maskString(rev.queueNo, "queue");
    const starCount = parseInt(rev.rating) || 5; 
    const starIcons = '★'.repeat(starCount) + '☆'.repeat(5 - starCount);
    const serviceUsed = rev.serviceType || "General Service";

    // --- DAGDAG NA LOGIC PARA SA REPLY ---
    let replyHTML = '';
    if (rev.adminReply && rev.adminReply.trim() !== "") {
        replyHTML = `
            <div class="admin-reply">
                <span class="admin-label">Response from Owner:</span>
                ${rev.adminReply}
            </div>
        `;
    }

    const card = `
        <div class="review-card">
            <div class="reviewer-info">
                <span class="reviewer-name">${maskedName}</span>
                <span class="q-tag">${maskedQueue}</span>
            </div>
            
            <div class="verified-badge">
                <span class="verified-icon">✓</span>
                Verified Transaction
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div class="service-badge">${serviceUsed}</div>
                <div class="stars">${starIcons}</div>
            </div>
            
            <div class="comment">"${rev.message || "No comment provided."}"</div>
            
            ${replyHTML} <div class="date">Transaction Date: ${rev.timestamp}</div>
        </div>
    `;
    listDiv.innerHTML += card;
});
        } catch (err) {
            console.error(err);
            document.getElementById('reviewsList').innerHTML = '<div class="no-reviews">Unable to connect. Please refresh the page.</div>';
        }
    }

    loadReviews();
</script>

</body>
</html>
